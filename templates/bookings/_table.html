<div class="table-responsive mt-3"><table class="table align-middle"><thead><tr><th>Turf</th><th>Date</th><th>Time</th><th>Status</th><th>Total</th></tr></thead><tbody>{% for booking in bookings %}<tr><td>{{ booking.turf.name }}</td><td>{{ booking.booking_date }}</td><td>{{ booking.slot.start_time|time:'g:i A' }}–{{ booking.slot.end_time|time:'g:i A' }}</td><td><span class="badge text-bg-secondary">{{ booking.get_status_display }}</span></td><td>₹{{ booking.total_amount }}</td></tr>{% empty %}<tr><td colspan="5" class="text-secondary">No bookings yet.</td></tr>{% endfor %}</tbody></table></div>
